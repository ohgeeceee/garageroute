# GarageRoute nginx config — managed by Certbot for SSL, augmented by Mavis.
#
# Augmentations (2026-06-22):
#   - www.garageroute.com → garageroute.com (301)
#   - Security headers: HSTS, X-Frame-Options, X-Content-Type-Options,
#     Referrer-Policy, Permissions-Policy, baseline CSP
#   - Hide upstream X-Powered-By: Next.js header

server {
    server_name garageroute.com www.garageroute.com;

    # www → apex (SEO canonical consolidation)
    if ($host = www.garageroute.com) {
        return 301 https://garageroute.com$request_uri;
    }

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Hide the upstream framework identifier
        proxy_hide_header X-Powered-By;
    }

    # Security headers — emitted on every response from this server block.
    # `always` ensures they're set on non-2xx responses too (404, 5xx).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), interest-cohort=()" always;
    # Baseline CSP — adjust if your analytics / embed scripts need relaxations.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://plausible.io; style-src 'self' 'unsafe-inline'; font-src 'self' data: https:; connect-src 'self' https: https://plausible.io; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/garageroute.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/garageroute.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
server {
    if ($host = www.garageroute.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = garageroute.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name garageroute.com www.garageroute.com;
    return 404; # managed by Certbot




}